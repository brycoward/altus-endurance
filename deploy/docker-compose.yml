services:
  db:
    image: postgres:16-alpine
    container_name: altus_endurance_db
    env_file: ../.env
    environment:
      - POSTGRES_USER=altus
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=altus
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: altus_endurance_redis
    restart: always

  app:
    build: 
      context: ..
      dockerfile: Dockerfile
    container_name: altus_endurance_app
    env_file: ../.env
    environment:
      - POSTGRES_DSN=postgresql+asyncpg://altus:${POSTGRES_PASSWORD}@db:5432/altus
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - LLM_PROVIDER=anthropic
      - LLM_API_KEY=${LLM_API_KEY}
    depends_on:
      - db
      - redis
    ports:
      - "80:8000"
    restart: always

  celery_worker:
    build: 
      context: ..
      dockerfile: Dockerfile
    container_name: altus_endurance_celery
    command: celery -A app.tasks worker --loglevel=info
    env_file: ../.env
    environment:
      - POSTGRES_DSN=postgresql+asyncpg://altus:${POSTGRES_PASSWORD}@db:5432/altus
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
    depends_on:
      - db
      - redis
    restart: always

  celery_beat:
    build: 
      context: ..
      dockerfile: Dockerfile
    container_name: altus_endurance_beat
    command: celery -A app.tasks beat --loglevel=info
    env_file: ../.env
    environment:
      - POSTGRES_DSN=postgresql+asyncpg://altus:${POSTGRES_PASSWORD}@db:5432/altus
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
    depends_on:
      - db
      - redis
    restart: always

volumes:
  postgres_data:
