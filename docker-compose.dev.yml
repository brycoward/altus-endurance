services:
  db:
    image: postgres:16-alpine
    container_name: altus_endurance_db
    environment:
      - POSTGRES_USER=altus
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=altus
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # No host port mapping — only reachable inside the Docker network

  redis:
    image: redis:7-alpine
    container_name: altus_endurance_redis
    # No host port mapping — only reachable inside the Docker network

  backend:
    build: ./backend
    container_name: altus_endurance_backend
    volumes:
      - ./backend:/app
      - ./digests:/digests
    environment:
      - POSTGRES_DSN=postgresql+asyncpg://altus:${POSTGRES_PASSWORD}@db:5432/altus
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - LLM_PROVIDER=${LLM_PROVIDER}
      - LLM_API_KEY=${LLM_API_KEY}
      - FRONTEND_ORIGIN=${FRONTEND_ORIGIN:-http://localhost:5174}
      - DEBUG_REQUESTS=${DEBUG_REQUESTS:-false}
    depends_on:
      - db
      - redis
    ports:
      - "8001:8000"

  celery_worker:
    build: ./backend
    container_name: altus_endurance_celery
    command: celery -A app.tasks worker --loglevel=info
    volumes:
      - ./backend:/app
      - ./digests:/digests
    environment:
      - POSTGRES_DSN=postgresql+asyncpg://altus:${POSTGRES_PASSWORD}@db:5432/altus
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
    depends_on:
      - db
      - redis

  celery_beat:
    build: ./backend
    container_name: altus_endurance_beat
    command: celery -A app.tasks beat --loglevel=info
    volumes:
      - ./backend:/app
      - ./digests:/digests
    environment:
      - POSTGRES_DSN=postgresql+asyncpg://altus:${POSTGRES_PASSWORD}@db:5432/altus
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
    depends_on:
      - db
      - redis

  telegram_bot:
    build: ./backend
    container_name: altus_endurance_bot
    command: python telegram_bot.py
    volumes:
      - ./backend:/app
      - ./digests:/digests
    environment:
      - POSTGRES_DSN=postgresql+asyncpg://altus:${POSTGRES_PASSWORD}@db:5432/altus
      - REDIS_URL=redis://redis:6379/0
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - LLM_PROVIDER=${LLM_PROVIDER}
      - LLM_API_KEY=${LLM_API_KEY}
    depends_on:
      - backend
      - db
      - redis

  frontend:
    build: ./frontend
    container_name: altus_endurance_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5174:5173"
    environment:
      - NODE_ENV=development

    depends_on:
      - backend

volumes:
  postgres_data:
