#       - backend
#       - db
#       - redis

  frontend:
    build: ./frontend
    container_name: altus_endurance_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5174:5173"
    environment:
      - NODE_ENV=development

    depends_on:
      - backend

volumes:
  postgres_data:
