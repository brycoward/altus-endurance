services:
  db:
    image: postgres:16-alpine
    container_name: altus_endurance_db
    environment:
      - POSTGRES_USER=altus
      - POSTGRES_PASSWORD=altus
      - POSTGRES_DB=altus
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  redis:
    image: redis:7-alpine
    container_name: altus_endurance_redis
    ports:
      - "6380:6379"

  backend:
    build: ./backend
    container_name: altus_endurance_backend
    volumes:
      - ./backend:/app
      - ./digests:/digests
    environment:
      - POSTGRES_DSN=postgresql+asyncpg://altus:altus@db:5432/altus
      - REDIS_URL=redis://redis:6379/0
      - LLM_PROVIDER=anthropic
      - LLM_API_KEY=${LLM_API_KEY}
    depends_on:
      - db
      - redis
    ports:
      - "8001:8000"

  celery_worker:
    build: ./backend
    container_name: altus_endurance_celery
    command: celery -A app.tasks worker --loglevel=info
    volumes:
      - ./backend:/app
      - ./digests:/digests
    environment:
      - POSTGRES_DSN=postgresql+asyncpg://altus:altus@db:5432/altus
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis

  celery_beat:
    build: ./backend
    container_name: altus_endurance_beat
    command: celery -A app.tasks beat --loglevel=info
    volumes:
      - ./backend:/app
      - ./digests:/digests
    environment:
      - POSTGRES_DSN=postgresql+asyncpg://altus:altus@db:5432/altus
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis

